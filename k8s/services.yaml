apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: cloud-backup
spec:
  replicas: 1
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
    spec:
      containers:
        - name: auth-service
          image: registry.digitalocean.com/cloud-backup-registry/app:auth
          ports: [{ containerPort: 5000 }]
          envFrom: [{ secretRef: { name: app-secrets } }]
          env: [{ name: PORT, value: "5000" }]
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: cloud-backup
spec:
  selector: { app: auth-service }
  ports: [{ port: 5000, targetPort: 5000 }]
---
